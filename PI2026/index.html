<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VivaEstudante - Splash Screen</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #030a16;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container Principal com o fundo azul escuro texturizado/místico */
.splash-container {
    position: relative;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle, #0a1e3f 0%, #030a16 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Brilho místico de fundo */
.mystic-orb {
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(0, 114, 181, 0.2);
    border-radius: 50%;
    filter: blur(50px);
    animation: pulseOrb 4s infinite alternate;
}

.splash-content {
    z-index: 2;
}

/* --- OLHO GREGO ESTILIZADO --- */
.evil-eye {
    margin-bottom: 30px;
    animation: float 3s ease-in-out infinite;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.eye-outer {
    width: 140px;
    height: 140px;
    background-color: #004b93;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px rgba(0, 75, 147, 0.6);
}

/*.eye-gold-ring {
    width: 125px;
    height: 125px;
    border: 3px solid #d4af37; /* Detalhe em ouro 
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}*/

.eye-white {
    width: 100px;
    height: 100px;
    background-color: #ffffff;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: rotate(45deg); /* Dá o formato levemente amendoado se desejar, ou mantenha circular */
}

.eye-blue {
    width: 55px;
    height: 55px;
    background: radial-gradient(circle, #00a4e4 0%, #005c9e 100%);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.eye-pupil {
    width: 25px;
    height: 25px;
    background-color: #050b14;
    border-radius: 50%;
    box-shadow: inset -2px -2px 5px rgba(255, 255, 255, 0.4);
}

/* --- TEXTOS (Tipografia Cinzel para o ar mítico) --- */
.splash-title {
    font-family: 'Cinzel', serif;
    color: #d4af37;
    font-size: 2.5rem;
    letter-spacing: 7px;
    margin-bottom: 5px;
    text-shadow: 0 2px 10px rgba(212, 175, 55, 0.3);
}

.splash-subtitle {
    font-family: 'Cinzel', serif;
    color: #ffffff;
    font-size: 1.5rem;
    letter-spacing: 5px;
    opacity: 0.9;
    margin-bottom: 40px;
}

/* --- LOADER ANTERIOR À TRANSIÇÃO --- */
.loader {
    width: 28px;
    height: 28px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    border-top-color: #d4af37;
    margin: 0 auto;
    animation: spin 1s ease-in-out infinite;
}

/* --- ANIMAÇÕES --- */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

@keyframes pulseOrb {
    0% { transform: scale(1); opacity: 0.2; }
    100% { transform: scale(1.2); opacity: 0.4; }
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
    </style>

    <script src="index.js" defer></script>

</head>
<body>

    <div class="splash-container">
        <div class="mystic-orb"></div>
        
        <div class="splash-content">
            <div class="evil-eye">
                <div class="eye-outer">
                    <div class="eye-gold-ring">
                        <div class="eye-white">
                            <div class="eye-blue">
                                <div class="eye-pupil"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <h1 class="splash-title">PROTEÇÃO</h1>
            <p class="splash-subtitle">E SORTE</p>

            <div class="loader"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
