<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhe seu Karma | Cadastro</title>
    <style>
        :root {
            --bg-deep: #0a0e17;
            --blue-greek: #0056b3;
            --blue-light: #00a8ff;
            --gold: #dfb76c;
            --text-light: #f5f6fa;
            --card-bg: rgba(15, 23, 42, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 86, 179, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(223, 183, 108, 0.05) 0%, transparent 40%);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(223, 183, 108, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        /* Olho Grego Minimalista em SVG */
        .logo-container {
            margin-bottom: 24px;
            display: inline-block;
        }

        .greek-eye {
            width: 80px;
            height: 80px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 8px;
            color: var(--text-light);
            text-transform: uppercase;
        }

        p.subtitle {
            font-size: 0.9rem;
            color: #8a99ad;
            margin-bottom: 32px;
            font-weight: 300;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--blue-light);
            background: rgba(0, 86, 179, 0.05);
            box-shadow: 0 0 15px rgba(0, 168, 255, 0.2);
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            text-align: left;
            font-size: 0.85rem;
            color: #8a99ad;
            cursor: pointer;
        }

        .terms input {
            accent-color: var(--blue-light);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .terms a {
            color: var(--gold);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--blue-greek), var(--blue-light));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 86, 179, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 168, 255, 0.4);
            filter: brightness(1.1);
        }

        .footer-text {
            margin-top: 24px;
            font-size: 0.85rem;
            color: #8a99ad;
        }

        .footer-text a {
            color: var(--blue-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: var(--gold);
        }
    </style>

   <script src="cadastro.js" defer></script>

</head>
<body>

    <div class="container">
        <div class="card">
            <div class="logo-container">
                <svg class="greek-eye" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10 L50 20 M50 90 L50 80 M15 50 L25 50 M85 50 L75 50" stroke="#dfb76c" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
                    <path d="M10 50C25 25 75 25 90 50C75 75 25 75 10 50Z" stroke="#dfb76c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="50" cy="50" r="22" fill="#0056b3" stroke="#f5f6fa" stroke-width="1.5"/>
                    <circle cx="50" cy="50" r="13" fill="#00a8ff"/>
                    <circle cx="50" cy="50" r="6" fill="#0a0e17"/>
                    <circle cx="47" cy="47" r="2" fill="#ffffff"/>
                </svg>
            </div>

            <h1>Karma</h1>
            <p class="subtitle">Proteja sua jornada, alinhe seu destino.</p>

            <form>
                <div class="input-group">
                    <label for="name">Nome Completo</label>
                    <input type="text" id="name" placeholder="Seu nome completo" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <div class="password-wrapper">
                          <input type="password" id="password" placeholder="••••••••" required>
                             <span class="toggle-password" onclick="togglePasswordVisibility()">
                              <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                 </svg>
          </span>
    </div>
</div>
                </div>

                <label class="terms">
                    <input type="checkbox" required>
                    <span>Aceito os <a href="#">Termos</a> e as <a href="#">Leis do Retorno</a></span>
                </label>

                <button type="submit" class="btn-submit">Criar Conta</button>
            </form>

            <p class="footer-text">Já possui um destino traçado? <a href="login.html">Fazer Login</a></p>


                <style>
    .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }

    .password-wrapper input {
        padding-right: 45px; /* Espaço para o ícone */
    }

    .toggle-password {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: var(--gold);
        opacity: 0.7;
        transition: opacity 0.3s;
        display: flex;
        align-items: center;
    }

    .toggle-password:hover {
        opacity: 1;
    }

    .toggle-password svg {
        width: 20px;
        height: 20px;
    }
</style>




        </div>
    </div>

</body>
</html>
